{% extends 'myapp/base.html' %}

{% block title %}Send OTP{% endblock %}

{% block content %}
<div class="glass-panel">
    <div class="text-center mb-4">
        <h3 class="fw-bold">Welcome Back</h3>
        <p class="text-muted-glass">Enter your mobile number to securely log in.</p>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label for="{{ form.phone_number.id_for_label }}" class="form-label fw-semibold">Phone Number</label>
            {{ form.phone_number }}
            {% if form.phone_number.errors %}
                <div class="text-warning small mt-1">{{ form.phone_number.errors }}</div>
            {% endif %}
        </div>
        <button type="submit" class="btn btn-custom w-100">Send OTP</button>
    </form>
</div>
{% endblock %}
