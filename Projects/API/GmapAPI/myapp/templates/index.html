<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenStreetMap Distance Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Leaflet Routing Machine CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    
    <style>
        #map {
            height: 400px;
            width: 100%;
            z-index: 1;
        }
        /* Style suggestions dropdown */
        .suggestions-list {
            position: absolute;
            background: white;
            border: 1px solid #ddd;
            border-radius: 0.5rem;
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
            z-index: 50;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .suggestion-item {
            padding: 8px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
        }
        .suggestion-item:hover {
            background-color: #f8fafc;
        }
        .suggestion-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-4xl w-full bg-white rounded-xl shadow-lg overflow-hidden">
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-3xl font-bold">Distance Calculator</h1>
            <p class="text-blue-100 mt-2">Find the distance and route between two locations (Free & Open Source)</p>
        </div>
        
        <div class="p-6 md:p-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div class="relative">
                    <label for="origin" class="block text-sm font-medium text-gray-700 mb-1">Origin</label>
                    <input type="text" id="origin" onkeyup="searchLocation('origin')" placeholder="Enter starting location" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors">
                    <div id="origin-suggestions" class="suggestions-list hidden"></div>
                </div>
                <div class="relative">
                    <label for="destination" class="block text-sm font-medium text-gray-700 mb-1">Destination</label>
                    <input type="text" id="destination" onkeyup="searchLocation('destination')" placeholder="Enter destination" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors">
                    <div id="destination-suggestions" class="suggestions-list hidden"></div>
                </div>
            </div>

            <div class="flex justify-center mb-8">
                <button onclick="calculateDistance()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-8 rounded-lg shadow transition-colors duration-200">
                    Calculate Distance
                </button>
            </div>

            <div id="result" class="hidden mb-6 p-4 rounded-lg bg-blue-50 border border-blue-100">
                <div class="flex flex-col md:flex-row justify-between items-center text-center md:text-left">
                    <div>
                        <p class="text-sm text-gray-600 font-medium">Distance</p>
                        <p id="distance-text" class="text-2xl font-bold text-blue-700">--</p>
                    </div>
                    <div class="mt-4 md:mt-0">
                        <p class="text-sm text-gray-600 font-medium">Estimated Time</p>
                        <p id="duration-text" class="text-2xl font-bold text-blue-700">--</p>
                    </div>
                </div>
            </div>

            <div class="rounded-xl overflow-hidden shadow-inner border border-gray-200">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Leaflet Routing Machine JS -->
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script>
        let map;
        let routingControl;
        let originCoords = null;
        let destCoords = null;

        // Initialize map
        map = L.map('map').setView([20.5937, 78.9629], 5); // Default to India center

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Fetch location suggestions using Nominatim API (OpenStreetMap)
        let searchTimeout;
        function searchLocation(inputId) {
            clearTimeout(searchTimeout);
            const query = document.getElementById(inputId).value;
            const suggestionsDiv = document.getElementById(`${inputId}-suggestions`);

            if (query.length < 3) {
                suggestionsDiv.classList.add('hidden');
                return;
            }

            searchTimeout = setTimeout(async () => {
                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`);
                    const data = await response.json();
                    
                    suggestionsDiv.innerHTML = '';
                    if (data.length > 0) {
                        data.forEach(place => {
                            const div = document.createElement('div');
                            div.className = 'suggestion-item text-sm text-gray-700';
                            div.textContent = place.display_name;
                            div.onclick = () => selectLocation(inputId, place, suggestionsDiv);
                            suggestionsDiv.appendChild(div);
                        });
                        suggestionsDiv.classList.remove('hidden');
                    } else {
                        suggestionsDiv.classList.add('hidden');
                    }
                } catch (error) {
                    console.error("Error fetching location:", error);
                }
            }, 500); // 500ms debounce
        }

        function selectLocation(inputId, place, suggestionsDiv) {
            document.getElementById(inputId).value = place.display_name;
            suggestionsDiv.classList.add('hidden');
            
            const coords = L.latLng(place.lat, place.lon);
            if (inputId === 'origin') {
                originCoords = coords;
            } else {
                destCoords = coords;
            }
        }

        // Close suggestions when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.relative')) {
                document.getElementById('origin-suggestions').classList.add('hidden');
                document.getElementById('destination-suggestions').classList.add('hidden');
            }
        });

        function calculateDistance() {
            if (!originCoords || !destCoords) {
                alert("Please search and select both locations from the dropdown suggestions.");
                return;
            }

            // Remove existing route if any
            if (routingControl) {
                map.removeControl(routingControl);
            }

            routingControl = L.Routing.control({
                waypoints: [
                    originCoords,
                    destCoords
                ],
                routeWhileDragging: false,
                addWaypoints: false,
                fitSelectedRoutes: true,
                showAlternatives: false,
                lineOptions: {
                    styles: [{color: '#2563EB', opacity: 0.8, weight: 6}]
                },
                createMarker: function() { return null; } // Hide default markers to avoid clutter
            }).addTo(map);

            // Add start/end markers manually
            L.marker(originCoords).addTo(map).bindPopup("Origin");
            L.marker(destCoords).addTo(map).bindPopup("Destination");

            routingControl.on('routesfound', function(e) {
                const routes = e.routes;
                const summary = routes[0].summary;
                
                // Convert meters to kilometers
                const distanceKm = (summary.totalDistance / 1000).toFixed(2);
                
                // Convert seconds to hours and minutes
                const totalMinutes = Math.round(summary.totalTime / 60);
                const hours = Math.floor(totalMinutes / 60);
                const minutes = totalMinutes % 60;
                let durationText = "";
                if (hours > 0) durationText += `${hours} hr `;
                durationText += `${minutes} min`;

                document.getElementById("distance-text").innerText = `${distanceKm} km`;
                document.getElementById("duration-text").innerText = durationText;
                document.getElementById("result").classList.remove("hidden");
                
                // Hide routing panel that leaflet-routing-machine generates by default
                const routingContainer = document.querySelector('.leaflet-routing-container');
                if(routingContainer){
                    routingContainer.style.display = 'none';
                }
            });
            
            routingControl.on('routingerror', function(e) {
                alert("Could not calculate a route between these locations. They might be too far apart or disconnected.");
            });
        }
    </script>
</body>
</html>
