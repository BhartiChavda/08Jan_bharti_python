<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .success-container {
            max-width: 500px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .icon {
            font-size: 50px;
            color: #28a745;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="success-container">
        <div class="icon">&#10004;</div>
        
        {% if messages %}
            {% for message in messages %}
                <h3 class="mb-3 {% if message.tags %}text-{{ message.tags }}{% endif %}">{{ message }}</h3>
            {% endfor %}
        {% else %}
            <h3 class="mb-3 text-success">Registration successful. A confirmation email has been sent.</h3>
        {% endif %}
        
        <p class="text-muted">You can now proceed to login or explore the site.</p>
        <a href="{% url 'register' %}" class="btn btn-outline-primary mt-3">Back to Register</a>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
