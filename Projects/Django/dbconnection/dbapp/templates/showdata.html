<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>show data </title>
</head>
<body style="background-color: skyblue; text-align: center; color: chocolate;">
    <h1>show data</h1>
    <hr>
    <table align="center" border="2">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>DOB</th>
                <th>Mobile</th>
                <th>Address</th>
                <th>Action</th>
            </tr>

        {% for i in data %}
        <tr>
            <td>{{ i.id }}</td>
            <td>{{ i.name }}</td>
            <td>{{ i.email }}</td>
            <td>{{ i.dob }}</td>
            <td>{{ i.mobile }}</td>
            <td>{{ i.address }}</td>
            <td><a href="{% url 'updatedata' i.id %}">update</a>&nbsp;<a href="{% url 'deletedata' i.id %}">delete</a></td>
        </tr>
        {% endfor %}

</table>
</body>
</html>
