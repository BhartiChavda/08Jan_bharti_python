<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB demo</title>
</head>
<body style="background-color: skyblue; text-align: center; color: chocolate;">
    <h1>Database</h1>
    <hr>
    <form method="POST">
        {% csrf_token %}
            <input type="text" value="{{obj.name}}" name="name" placeholder="name"><br><br>
            <input type="email" value="{{obj.email}}" name="email" placeholder="email"><br><br>
            <input type="date" value="{{obj.dob |date:'Y-m-d'}}" name="dob" placeholder="DOB"><br><br>
            <input type="number" value="{{obj.mobile}}" name="mobile" placeholder="mobile"><br><br>
            <textarea name="address">{{obj.address}}</textarea><br><br>
            <input type="submit" placeholder="update">
    </form>
  
    

    
</body>
</html>
