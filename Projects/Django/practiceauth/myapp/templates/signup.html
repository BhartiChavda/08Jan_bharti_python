<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Modern App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">

    <div class="flex min-h-screen items-center justify-center p-6">
        <div class="w-full max-w-md">
            <!-- Header -->
            <div class="mb-8 text-center">
                <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-xl bg-indigo-600 text-white shadow-lg shadow-indigo-200">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-7 h-7">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M18 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0ZM3 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 9.374 21c-2.331 0-4.512-.645-6.374-1.766Z" />
                    </svg>
                </div>
                <h1 class="text-3xl font-bold tracking-tight text-gray-900">Create an account</h1>
                <p class="mt-2 text-sm text-gray-500">Join thousands of users today.</p>
            </div>

            <!-- Signup Card -->
            <div class="rounded-2xl bg-white p-8 shadow-xl shadow-slate-200/60 border border-slate-100">
                <form action="#" method="POST" class="space-y-4">
                    {% csrf_token %}
                    
                    <!-- Full Name -->
                    <div>
                        <label for="name" class="mb-1.5 block text-sm font-medium text-gray-700">Full Name</label>
                        <input type="text" name="fullname" placeholder="John Doe" required
                            class="w-full rounded-lg border border-gray-300 px-4 py-2 text-gray-900 placeholder-gray-400 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all">
                    </div>

                    <!-- Email -->
                    <div>
                        <label for="email" class="mb-1.5 block text-sm font-medium text-gray-700">Email Address</label>
                        <input type="email" name="email" placeholder="name@company.com" required
                            class="w-full rounded-lg border border-gray-300 px-4 py-2 text-gray-900 placeholder-gray-400 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all">
                    </div>

                    <!-- Password Grid -->
                    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
                        <div>
                            <label for="password" class="mb-1.5 block text-sm font-medium text-gray-700">Password</label>
                            <input type="password" name="password" placeholder="••••••••" required
                                class="w-full rounded-lg border border-gray-300 px-4 py-2 text-gray-900 placeholder-gray-400 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all">
                        </div>
                        <div>
                            <label for="confirm-password" class="mb-1.5 block text-sm font-medium text-gray-700">Confirm</label>
                            <input type="password" name="cpassword" placeholder="••••••••" required
                                class="w-full rounded-lg border border-gray-300 px-4 py-2 text-gray-900 placeholder-gray-400 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all">
                        </div>
                    </div>

                    <!-- Terms Checkbox -->
                    <div class="flex items-start pt-2">
                        <div class="flex h-5 items-center">
                            <input id="terms" type="checkbox" required class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                        </div>
                        <label for="terms" class="ml-2 text-xs text-gray-600">
                            I agree to the <a href="#" class="text-indigo-600 font-medium hover:underline">Terms of Service</a> and <a href="#" class="text-indigo-600 font-medium hover:underline">Privacy Policy</a>.
                        </label>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" 
                        class="mt-2 w-full rounded-lg bg-indigo-600 px-4 py-3 text-sm font-semibold text-white shadow-md shadow-indigo-200 transition-all hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 active:scale-[0.98]">
                        <a href="/">Get Started</a>
                    </button>

                    <!-- Divider -->
                    <div class="relative flex items-center py-2">
                        <div class="flex-grow border-t border-gray-100"></div>
                        <span class="mx-3 flex-shrink text-[10px] uppercase tracking-widest text-gray-400">Or sign up with</span>
                        <div class="flex-grow border-t border-gray-100"></div>
                    </div>

                    <!-- Social Signup -->
                    <div class="grid grid-cols-2 gap-3">
                        <button type="button" class="flex items-center justify-center gap-2 rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-semibold text-gray-700 hover:bg-gray-50 transition-colors">
                            <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="h-4 w-4" alt="Google">
                            Google
                        </button>
                        <button type="button" class="flex items-center justify-center gap-2 rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-semibold text-gray-700 hover:bg-gray-50 transition-colors">
                            <img src="https://www.svgrepo.com/show/475647/facebook-color.svg" class="h-4 w-4" alt="Facebook">
                            Facebook
                        </button>
                    </div>
                </form>
            </div>

            <!-- Back to Login -->
            <p class="mt-8 text-center text-sm text-gray-600">
                Already have an account? 
                <a href="/" class="font-semibold text-indigo-600 hover:underline">Log in here</a>
            </p>
        </div>
    </div>

</body>
</html>
