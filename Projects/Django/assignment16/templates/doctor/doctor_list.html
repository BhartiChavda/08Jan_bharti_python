{% extends 'doctor/base.html' %}
{% block content %}
<div class="glass-card">
    <h2><i class="fa-solid fa-user-doctor"></i> Our Doctors</h2>
    <div class="doctor-grid">
        {% for doctor in doctors %}
        <div class="glass-card doctor-item" style="padding: 20px; margin-bottom: 0;">
            <div>
                <h3><a href="{% url 'doctor_profile' doctor.id %}" style="text-decoration: none; color: inherit;">{{ doctor.name }}</a></h3>
                <p class="specialty"><i class="fa-solid fa-stethoscope"></i> {{ doctor.specialty }}</p>
                <p style="font-size: 0.9rem; color: #666;"><i class="fa-solid fa-location-dot"></i> {{ doctor.location }}</p>
            </div>
            <a href="{% url 'doctor_profile' doctor.id %}" class="btn-primary" style="text-align: center; margin-top: 15px; text-decoration: none; display: block;">View Profile</a>
        </div>
        {% empty %}
        <p>No doctors available at the moment.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
