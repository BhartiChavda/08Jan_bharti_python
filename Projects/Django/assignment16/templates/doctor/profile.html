{% extends 'doctor/base.html' %}
{% block content %}
<div class="glass-card profile-card">
    <div style="text-align: center; margin-bottom: 20px;">
        <i class="fa-solid fa-user-doctor" style="font-size: 4rem; color: var(--primary-color);"></i>
    </div>
    <h2 style="text-align: center; border-bottom: none;"><i class="fa-solid fa-id-card"></i> {{ doctor.name }}</h2>
    <div style="margin-top: 20px;">
        <p><strong><i class="fa-solid fa-stethoscope" style="width: 20px;"></i> Specialty:</strong> {{ doctor.specialty }}</p>
        <p><strong><i class="fa-solid fa-clock" style="width: 20px;"></i> Availability:</strong> {{ doctor.availability }}</p>
        <p><strong><i class="fa-solid fa-location-dot" style="width: 20px;"></i> Location:</strong> {{ doctor.location }}</p>
    </div>
    <div style="margin-top: 30px; text-align: center;">
        <a href="{% url 'payment' %}" class="btn-primary" style="text-decoration: none;"><i class="fa-solid fa-calendar-check"></i> Book Appointment</a>
    </div>
</div>
{% endblock %}
