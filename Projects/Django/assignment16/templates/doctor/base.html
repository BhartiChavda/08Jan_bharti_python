<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Finder | Find the Best Care</title>
    {% load static %}
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="app-container">
        <header class="glass-header">
            <div class="logo">
                <i class="fa-solid fa-stethoscope"></i>
                <span>DoctorFinder</span>
            </div>
            <nav class="main-nav">
                <a href="{% url 'home' %}"><i class="fa-solid fa-house"></i> Home</a>
                <a href="{% url 'doctor_list' %}"><i class="fa-solid fa-user-doctor"></i> Doctors</a>
                <a href="{% url 'map_view' %}"><i class="fa-solid fa-map-location-dot"></i> Map</a>
                <a href="{% url 'patient_registration' %}"><i class="fa-solid fa-user-plus"></i> Register</a>
                <a href="{% url 'contact' %}"><i class="fa-solid fa-envelope"></i> Contact</a>
            </nav>
        </header>
        <main class="content-wrapper">
            {% block content %}{% endblock %}
        </main>
        <footer class="glass-footer">
            <p>&copy; 2026 Doctor Finder. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
