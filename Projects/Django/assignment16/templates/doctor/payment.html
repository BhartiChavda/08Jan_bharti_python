{% extends 'doctor/base.html' %}
{% block content %}
<div class="glass-card form-container" style="max-width: 500px; margin: 0 auto; text-align: center;">
    <h2><i class="fa-solid fa-credit-card"></i> Secure Payment</h2>
    <div style="margin: 20px 0;">
        <i class="fa-brands fa-cc-visa" style="font-size: 2.5rem; color: #1434CB; margin: 0 10px;"></i>
        <i class="fa-brands fa-cc-mastercard" style="font-size: 2.5rem; color: #EB001B; margin: 0 10px;"></i>
        <i class="fa-brands fa-paypal" style="font-size: 2.5rem; color: #00457C; margin: 0 10px;"></i>
    </div>
    <p style="margin-bottom: 30px; font-size: 1.1rem;">Lab 16: Complete your booking payment securely via Paytm Integration.</p>
    
    <form method="post" action="https://securegw-stage.paytm.in/order/process">
        <!-- Dummy Paytm Payment Form fields -->
        <input type="hidden" name="MID" value="DUMMY_MID_123">
        <input type="hidden" name="ORDER_ID" value="ORDER_12345">
        <input type="hidden" name="TXN_AMOUNT" value="500.00">
        <button type="submit" class="btn-primary" style="width: 100%; font-size: 1.2rem; padding: 15px;"><i class="fa-solid fa-lock"></i> Pay ₹500 with Paytm</button>
    </form>
</div>
{% endblock %}
