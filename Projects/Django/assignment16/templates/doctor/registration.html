{% extends 'doctor/base.html' %}
{% block content %}
<div class="glass-card form-container" style="max-width: 600px; margin: 0 auto;">
    <h2><i class="fa-solid fa-user-plus"></i> Patient Registration</h2>
    <form id="registration-form" method="post">
        {% csrf_token %}
        <div style="margin-bottom: 20px;">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;">Register</button>
    </form>
</div>

<script>
    // Lab 3, 10: JS-enabled form validation
    document.getElementById('registration-form').addEventListener('submit', function(e) {
        let email = document.getElementById('id_email').value;
        let phone = document.getElementById('id_phone').value;
        let valid = true;

        if (!email.includes('@')) {
            alert('Invalid email format');
            valid = false;
        }

        if (phone.length < 10) {
            alert('Phone number must be at least 10 digits long');
            valid = false;
        }

        if (!valid) {
            e.preventDefault();
        }
    });
</script>
{% endblock %}
