<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Vegetable Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-50">

  <!-- Main Container -->
  <div class="min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-2xl rounded-2xl overflow-hidden flex flex-col md:flex-row w-full max-w-5xl">

      <!-- Left Side Image -->
      <div class="md:w-1/2 w-full h-[500px]">
  <img 
    src="https://images.unsplash.com/photo-1592924357228-91a4daadcfea?auto=format&fit=crop&w=800&q=80"
    class="w-full h-full object-cover"
    alt="Vegetables"
  />
</div>

      <!-- Right Side Form -->
      <div class="w-full md:w-1/2 p-8 md:p-12">

        <div class="text-center mb-8">
          <h2 class="text-3xl font-bold text-green-600">Welcome Back</h2>
          <p class="text-gray-500 mt-2">Login to continue your fresh shopping</p>
        </div>

        <form method="POST">
          {% csrf_token %}

          <!-- Email -->
          <div>
            <label class="block text-gray-700 font-medium mb-1">Email</label>
            <input 
              type="email" name="email"
              placeholder="Enter email"
              class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
            />
          </div>

          <!-- Password -->
          <div>
            <label class="block text-gray-700 font-medium mb-1">Password</label>
            <input 
              type="password" name="password"
              placeholder="Enter password"
              class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
            />
          </div>

          <!-- Remember + Forgot -->
          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2">
              <input type="checkbox" class="accent-green-600">
              Remember me
            </label>

            <a href="#" class="text-green-600 hover:underline">Forgot Password?</a>
          </div>

          <!-- Login Button -->
          <button 
            type="submit"
            class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-semibold transition"
          >
            Login
          </button>

          <!-- Register -->
          <p class="text-center text-gray-500 text-sm">
            Don’t have an account? 
            <a href="/signup" class="text-green-600 font-medium hover:underline">Register</a>
          </p>

        </form>

      </div>

    </div>

  </div>

</body>
</html>
