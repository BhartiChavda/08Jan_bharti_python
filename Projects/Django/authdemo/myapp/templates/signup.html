<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Signup - Vegetable Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-50">

  <!-- Main Container -->
  <div class="min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-2xl rounded-2xl overflow-hidden flex flex-col md:flex-row w-full max-w-5xl">

      <!-- Left Image Section -->
      <div class="md:w-1/2 hidden md:block">
        <img 
          src="https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=800&q=80"
          class="h-full w-full object-cover"
          alt="Fresh Vegetables"
        />
      </div>

      <!-- Right Form Section -->
      <div class="w-full md:w-1/2 p-8 md:p-12">

        <div class="text-center mb-8">
          <h2 class="text-3xl font-bold text-green-600">Create Account</h2>
          <p class="text-gray-500 mt-2">Join us for fresh & healthy shopping</p>
        </div>

        <form method="POST">
          {% csrf_token %}

          <!-- Full Name -->
          <div>
            <label class="block text-gray-700 font-medium mb-1">Full Name</label>
            <input 
              type="text" name="fullname"
              placeholder="Enter your name"
              class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
            />
          </div>

          <!-- Email -->
          <div>
            <label class="block text-gray-700 font-medium mb-1">Email</label>
            <input 
              type="email" name="email"
              placeholder="Enter email"
              class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
            />
          </div>

          <!-- Mobile -->
          <div>
            <label class="block text-gray-700 font-medium mb-1">Mobile Number</label>
            <input 
              type="text" name="mobile"
              placeholder="Enter mobile number"
              class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
            />
          </div>

          <!-- Password -->
          <div>
            <label class="block text-gray-700 font-medium mb-1">Password</label>
            <input 
              type="password" name="password"
              placeholder="Create password"
              class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
            />
          </div>

          <!-- Confirm Password -->
          <div>
            <label class="block text-gray-700 font-medium mb-1">Confirm Password</label>
            <input 
              type="password" name="cpassword"
              placeholder="Confirm password"
              class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
            />
          </div>

          <!-- Terms -->
          <div class="flex items-center gap-2 text-sm">
            <input type="checkbox" class="accent-green-600">
            <span>I agree to terms & conditions</span>
          </div>

          <!-- Signup Button -->
          <button 
            type="submit"
            class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-semibold transition"
          >
            Sign Up
          </button>

          <!-- Login Link -->
          <p class="text-center text-gray-500 text-sm">
            Already have an account? 
            <a href="/" class="text-green-600 font-medium hover:underline">Login</a>
          </p>

        </form>

      </div>

    </div>

  </div>

</body>
</html>
