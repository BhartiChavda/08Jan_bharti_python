<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vegetable Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-50">

<!-- 🌿 Navbar -->
<nav class="bg-white shadow-md p-4 flex justify-between items-center">
  <h1 class="text-2xl font-bold text-green-600">VegShop</h1>

  <ul class="hidden md:flex gap-6 font-medium">
    <li><a href="#" class="hover:text-green-600">Home</a></li>
    <li><a href="#" class="hover:text-green-600">Products</a></li>
    <li><a href="#" class="hover:text-green-600">About</a></li>
    <li><a href="#" class="hover:text-green-600">Contact</a></li>
  </ul>

  <button class="bg-green-600 text-white px-4 py-2 rounded-lg">Cart</button>

  <!-- Buttons -->
  <div class="flex gap-3">

    <!-- Login -->
    <a href="/" id="loginBtn"
      class="bg-green-600 text-white px-4 py-2 rounded-lg">
      Login
    </a>

    <!-- Logout -->
    <button id="logoutBtn"
      class="bg-red-500 text-white px-4 py-2 rounded-lg hidden">
      Logout
    </button>

</nav>

<!-- 🌿 Hero Section -->
<section class="flex flex-col md:flex-row items-center justify-between p-10">

  <!-- Text -->
  <div class="md:w-1/2 space-y-5">
    <h2 class="text-4xl font-bold text-green-700">
      Fresh Vegetables Delivered to Your Door
    </h2>
    <p class="text-gray-600">
      Buy fresh, organic and healthy vegetables directly from farms.
    </p>

    <button class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700">
      Shop Now
    </button>
  </div>

  <!-- Image -->
  <div class="md:w-1/2 mt-6 md:mt-0">
    <img 
      src="https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=800&q=80"
      class="rounded-xl shadow-lg"
    />
  </div>

</section>

<!-- 🌿 Products Section -->
<section class="p-10">

  <h2 class="text-3xl font-bold text-center text-green-600 mb-8">
    Our Products
  </h2>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

    <!-- Product Card -->
    <div class="bg-white p-4 rounded-xl shadow">
      <img src="https://images.unsplash.com/photo-1582515073490-dcdb7c48a5bb" class="rounded-lg mb-3">
      <h3 class="text-xl font-semibold">Tomato</h3>
      <p class="text-gray-500">₹40/kg</p>
      <button class="mt-3 w-full bg-green-600 text-white py-2 rounded-lg">Add to Cart</button>
    </div>

    <div class="bg-white p-4 rounded-xl shadow">
      <img src="https://images.unsplash.com/photo-1584270354949-1a71c6d2c03c" class="rounded-lg mb-3">
      <h3 class="text-xl font-semibold">Carrot</h3>
      <p class="text-gray-500">₹50/kg</p>
      <button class="mt-3 w-full bg-green-600 text-white py-2 rounded-lg">Add to Cart</button>
    </div>

    <div class="bg-white p-4 rounded-xl shadow">
      <img src="https://images.unsplash.com/photo-1604908176997-431c92dc6a98" class="rounded-lg mb-3">
      <h3 class="text-xl font-semibold">Broccoli</h3>
      <p class="text-gray-500">₹80/kg</p>
      <button class="mt-3 w-full bg-green-600 text-white py-2 rounded-lg">Add to Cart</button>
    </div>

  </div>

</section>

<!-- 🌿 Footer -->
<footer class="bg-green-600 text-white text-center p-4">
  <p>© 2026 VegShop | Fresh & Healthy</p>
</footer>

</body>
</html>
