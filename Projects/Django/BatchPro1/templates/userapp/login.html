{% extends 'base.html' %}
{% block title %}Sign In | NotesHub Pro{% endblock %}
{% block content %}
<div class="flex-1 flex items-center justify-center p-4 sm:p-6 lg:p-8">
    <div class="max-w-md w-full">
        <!-- Brand / Header -->
        <div class="text-center mb-10">
            <h2 class="text-3xl font-bold text-slate-900 tracking-tight">Welcome back</h2>
            <p class="text-slate-500 mt-2 font-medium">Please enter your details to sign in.</p>
        </div>

        <!-- Auth Card -->
        <div class="bg-white border border-slate-200 rounded-2xl shadow-sm p-8 sm:p-10">
            <form method="post" class="space-y-6">
                {% csrf_token %}
                <div class="space-y-1.5">
                    <label class="text-sm font-semibold text-slate-700 ml-1">Username</label>
                    <input type="text" name="username" required
                           class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm font-medium placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all"
                           placeholder="Enter your username">
                </div>

                <div class="space-y-1.5">
                    <div class="flex justify-between items-center px-1">
                        <label class="text-sm font-semibold text-slate-700">Password</label>
                        <a href="{% url 'password_reset' %}" class="text-xs font-semibold text-indigo-600 hover:text-indigo-700">Forgot?</a>
                    </div>
                    <input type="password" name="password" required
                           class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all"
                           placeholder="••••••••">
                </div>
                
                <button type="submit" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-bold shadow-sm transition-all">
                    Sign In to Workspace
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-slate-100 text-center">
                <p class="text-sm font-medium text-slate-500">
                    New to NotesHub? <a href="{% url 'signup' %}" class="text-indigo-600 font-bold hover:underline">Create an account</a>
                </p>
            </div>
        </div>

        <!-- Security Footer -->
        <div class="mt-10 flex justify-center items-center gap-2 opacity-40">
            <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <span class="text-[10px] font-bold uppercase tracking-widest text-slate-900">Secure AES-256 Encryption Active</span>
        </div>
    </div>
</div>
{% endblock %}
